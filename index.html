<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urlaubsplaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-lg mx-auto bg-white rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Urlaubsantrag stellen</h2>
        
        <form id="urlaubsForm" class="space-y-4">
            <input type="text" id="name" placeholder="Name" class="w-full border p-2 rounded" required>
            <input type="text" id="pnr" placeholder="Personalnummer" class="w-full border p-2 rounded" required>
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="start" class="border p-2 rounded" required>
                <input type="date" id="ende" class="border p-2 rounded" required>
            </div>
            <textarea id="grund" placeholder="Grund (optional)" class="w-full border p-2 rounded"></textarea>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-md font-bold hover:bg-blue-700">
                Antrag absenden
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-gray-200">
            <h3 class="text-lg font-bold text-gray-800 mb-2">Status prüfen</h3>
            <p class="text-xs text-gray-500 mb-4">Gib deine Personalnummer ein, um zu sehen, ob dein Urlaub genehmigt wurde.</p>
            
            <div class="flex space-x-2">
                <input type="text" id="pnrCheck" class="flex-1 border border-gray-300 rounded-md p-2" placeholder="Deine PNR eingeben">
                <button onclick="checkStatus()" class="bg-gray-800 text-white px-4 py-2 rounded-md font-bold hover:bg-black transition text-sm">
                    Prüfen
                </button>
            </div>
            
            <div id="statusErgebnis" class="mt-4 hidden p-4 rounded-md text-sm font-bold"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gmwmnnsmanmhblmmvusj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd21ubnNtYW5taGJsbW12dXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjA5ODYsImV4cCI6MjA5Mjg5Njk4Nn0.Y5_SWw_25e0lTDcxU1dqkX7atICOpyk2_jpcWBkrRKM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Antrag absenden
        document.getElementById('urlaubsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Wird gesendet...';

            const { error } = await _supabase.from('Urlaubsplaner').insert([{
                name: document.getElementById('name').value,
                personalnummer: document.getElementById('pnr').value,
                start_datum: document.getElementById('start').value,
                end_datum: document.getElementById('ende').value,
                begruendung: document.getElementById('grund').value,
                status: 'offen'
            }]);

            if (error) {
                alert('Fehler: ' + error.message);
            } else {
                alert('Erfolg! Antrag wurde abgeschickt.');
                document.getElementById('urlaubsForm').reset();
            }
            btn.innerText = 'Antrag absenden';
        });

        // 2. Status prüfen
        async function checkStatus() {
            const pnr = document.getElementById('pnrCheck').value;
            const resDiv = document.getElementById('statusErgebnis');

            if (!pnr) return alert("Bitte Nummer eingeben!");

            const { data, error } = await _supabase
                .from('Urlaubsplaner')
                .select('*')
                .eq('personalnummer', pnr)
                .order('created_at', { ascending: false });

            resDiv.classList.remove('hidden');

            if (data && data.length > 0) {
                const s = data[0].status; // Wir nehmen den neuesten Antrag
                resDiv.innerHTML = `Dein Antrag vom ${data[0].start_datum}<br>Status: <span class="uppercase">${s}</span>`;
                
                // Farben setzen
                if (s === 'genehmigt') {
                    resDiv.className = "mt-4 p-4 rounded-md text-sm font-bold bg-green-100 text-green-800 border border-green-300";
                } else if (s === 'abgelehnt') {
                    resDiv.className = "mt-4 p-4 rounded-md text-sm font-bold bg-red-100 text-red-800 border border-red-300";
                } else {
                    resDiv.className = "mt-4 p-4 rounded-md text-sm font-bold bg-yellow-100 text-yellow-800 border border-yellow-300";
                }
            } else {
                resDiv.innerText = "Kein Antrag unter dieser Nummer gefunden.";
                resDiv.className = "mt-4 p-4 rounded-md text-sm font-bold bg-gray-200 text-gray-700";
            }
        }
    </script>
</body>
</html>
