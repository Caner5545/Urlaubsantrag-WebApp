<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urlaubsplaner 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div class="max-w-lg mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Urlaubsantrag stellen</h2>
        
        <form id="urlaubsForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Vollständiger Name</label>
                    <input type="text" id="name" class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="Max Mustermann" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Personalnummer</label>
                    <input type="text" id="pnr" class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="12345" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Art des Urlaubs</label>
                <select id="typ" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                    <option value="Erholungsurlaub">Erholungsurlaub</option>
                    <option value="Sonderurlaub">Sonderurlaub</option>
                    <option value="Fortbildung">Fortbildung</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Von</label>
                    <input type="date" id="start" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700">Bis</label>
                    <input type="date" id="ende" class="mt-1 block w-full border border-gray-300 rounded-md p-2" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Begründung</label>
                <textarea id="grund" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md p-2" placeholder="Optional..."></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-md font-bold hover:bg-blue-700 transition">
                Antrag absenden
            </button>
        </form>
    </div>

    <script>
    <div class="mt-10 pt-6 border-t border-gray-200">
    <h3 class="text-lg font-bold text-gray-800 mb-2">Status prüfen</h3>
    <p class="text-sm text-gray-600 mb-4">Gib deine Personalnummer ein, um den Status deines Antrags zu sehen.</p>
    <div class="flex space-x-2">
        <input type="text" id="pnrCheck" class="flex-1 border border-gray-300 rounded-md p-2" placeholder="Deine PNR">
        <button onclick="checkStatus()" class="bg-gray-800 text-white px-4 py-2 rounded-md font-bold hover:bg-black transition">Prüfen</button>
    </div>
    <div id="statusErgebnis" class="mt-4 hidden p-4 rounded-md text-sm font-bold"></div>
</div>

<script>
    const SUPABASE_URL = 'https://gmwmnnsmanmhblmmvusj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd21ubnNtYW5taGJsbW12dXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjA5ODYsImV4cCI6MjA5Mjg5Njk4Nn0.Y5_SWw_25e0lTDcxU1dqkX7atICOpyk2_jpcWBkrRKM';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // FUNKTION 1: ANTRAG ABSENDEN
    document.getElementById('urlaubsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const antrag = {
            name: document.getElementById('name').value,
            personalnummer: document.getElementById('pnr').value,
            typ: document.getElementById('typ').value,
            start_datum: document.getElementById('start').value,
            end_datum: document.getElementById('ende').value,
            begruendung: document.getElementById('grund').value,
            status: 'offen'
        };

        const { error } = await _supabase.from('Urlaubsplaner').insert([antrag]);
        if (error) alert('Fehler: ' + error.message);
        else {
            alert('Antrag wurde abgeschickt!');
            document.getElementById('urlaubsForm').reset();
        }
    });

    // FUNKTION 2: STATUS ABFRAGEN
    async function checkStatus() {
        const pnr = document.getElementById('pnrCheck').value;
        const ergebnisDiv = document.getElementById('statusErgebnis');

        if (!pnr) return alert("Bitte Personalnummer eingeben!");

        const { data, error } = await _supabase
            .from('Urlaubsplaner')
            .select('status, start_datum')
            .eq('personalnummer', pnr)
            .order('created_at', { ascending: false }) // Neuesten Antrag zuerst
            .limit(1);

        ergebnisDiv.classList.remove('hidden', 'bg-yellow-100', 'bg-green-100', 'bg-red-100');
        
        if (data && data.length > 0) {
            const status = data[0].status;
            ergebnisDiv.innerText = `Dein Antrag vom ${data[0].start_datum} ist: ${status.toUpperCase()}`;
            
            // Farben je nach Status
            if (status === 'offen') ergebnisDiv.classList.add('bg-yellow-100', 'text-yellow-800');
            else if (status === 'genehmigt') ergebnisDiv.classList.add('bg-green-100', 'text-green-800');
            else ergebnisDiv.classList.add('bg-red-100', 'text-red-800');
        } else {
            ergebnisDiv.innerText = "Kein Antrag unter dieser Nummer gefunden.";
            ergebnisDiv.classList.add('bg-gray-100', 'text-gray-800');
        }
    }
</script>

    </script>
</body>
</html>
