<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urlaubsplaner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h2 class="text-2xl font-bold">Urlaubsantrag</h2>
            <p class="text-blue-100 text-sm mt-1">Fülle das Formular aus, um Urlaub zu beantragen</p>
        </div>

        <div class="p-6">
            <form id="urlaubsForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Name</label>
                        <input type="text" id="name" placeholder="Max Mustermann" class="w-full border-b-2 border-gray-200 p-2 focus:border-blue-500 outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Personalnummer</label>
                        <input type="text" id="pnr" placeholder="12345" class="w-full border-b-2 border-gray-200 p-2 focus:border-blue-500 outline-none transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Art des Urlaubs</label>
                    <select id="typ" class="w-full border-b-2 border-gray-200 p-2 focus:border-blue-500 outline-none transition bg-white">
                        <option value="Erholungsurlaub">🌴 Erholungsurlaub</option>
                        <option value="Sonderurlaub">⭐ Sonderurlaub</option>
                        <option value="Fortbildung">📚 Fortbildung</option>
                        <option value="Krank / Arzt">🏥 Krank / Arzt</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Von</label>
                        <input type="date" id="start" class="w-full border-b-2 border-gray-200 p-2 focus:border-blue-500 outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase">Bis</label>
                        <input type="date" id="ende" class="w-full border-b-2 border-gray-200 p-2 focus:border-blue-500 outline-none transition" required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase">Begründung</label>
                    <textarea id="grund" rows="2" placeholder="Optionaler Grund..." class="w-full border-b-2 border-gray-200 p-2 focus:border-blue-500 outline-none transition resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all active:scale-95">
                    Antrag jetzt absenden
                </button>
            </form>

            <div class="mt-12 pt-8 border-t-2 border-dashed border-gray-100">
                <div class="bg-gray-50 rounded-xl p-4">
                    <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
                        🔍 Status-Check für Mitarbeiter
                    </h3>
                    <div class="flex space-x-2">
                        <input type="text" id="pnrCheck" class="flex-1 border border-gray-300 rounded-lg p-2 text-sm shadow-sm" placeholder="Deine PNR eingeben">
                        <button onclick="checkStatus()" class="bg-gray-800 text-white px-4 py-2 rounded-lg font-bold hover:bg-black transition text-sm">
                            Prüfen
                        </button>
                    </div>
                    <div id="statusErgebnis" class="mt-4 hidden p-4 rounded-lg text-sm font-bold animate-pulse"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gmwmnnsmanmhblmmvusj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd21ubnNtYW5taGJsbW12dXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjA5ODYsImV4cCI6MjA5Mjg5Njk4Nn0.Y5_SWw_25e0lTDcxU1dqkX7atICOpyk2_jpcWBkrRKM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Antrag absenden
        document.getElementById('urlaubsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Wird übertragen...';
            btn.disabled = true;

            const { error } = await _supabase.from('Urlaubsplaner').insert([{
                name: document.getElementById('name').value,
                personalnummer: document.getElementById('pnr').value,
                typ: document.getElementById('typ').value,
                start_datum: document.getElementById('start').value,
                end_datum: document.getElementById('ende').value,
                begruendung: document.getElementById('grund').value,
                status: 'offen'
            }]);

            if (error) {
                alert('Fehler: ' + error.message);
            } else {
                alert('Perfekt! Dein Antrag wurde gespeichert.');
                document.getElementById('urlaubsForm').reset();
            }
            btn.innerText = originalText;
            btn.disabled = false;
        });

        // 2. Status prüfen
        async function checkStatus() {
            const pnr = document.getElementById('pnrCheck').value;
            const resDiv = document.getElementById('statusErgebnis');

            if (!pnr) return alert("Bitte Personalnummer eingeben!");

            const { data, error } = await _supabase
                .from('Urlaubsplaner')
                .select('*')
                .eq('personalnummer', pnr)
                .order('created_at', { ascending: false });

            resDiv.classList.remove('hidden', 'animate-pulse');

            if (data && data.length > 0) {
                const antrag = data[0]; // Der aktuellste Antrag
                const datumVon = new Date(antrag.start_datum).toLocaleDateString('de-DE');
                const datumBis = new Date(antrag.end_datum).toLocaleDateString('de-DE');
                
                resDiv.innerHTML = `
                    <div class="text-xs uppercase opacity-70 mb-1">Letzter Antrag für Zeitraum:</div>
                    <div class="mb-2">${datumVon} bis ${datumBis}</div>
                    <div class="text-lg">Status: <span class="underline">${antrag.status.toUpperCase()}</span></div>
                `;
                
                if (antrag.status === 'genehmigt') {
                    resDiv.className = "mt-4 p-4 rounded-lg text-sm font-bold bg-green-500 text-white shadow-lg shadow-green-200";
                } else if (antrag.status === 'abgelehnt') {
                    resDiv.className = "mt-4 p-4 rounded-lg text-sm font-bold bg-red-500 text-white shadow-lg shadow-red-200";
                } else {
                    resDiv.className = "mt-4 p-4 rounded-lg text-sm font-bold bg-yellow-400 text-yellow-900 shadow-lg shadow-yellow-100";
                }
            } else {
                resDiv.innerText = "Kein Antrag unter dieser PNR gefunden.";
                resDiv.className = "mt-4 p-4 rounded-lg text-sm font-bold bg-gray-200 text-gray-700";
            }
        }
    </script>
    
        <!-- Footer mit Copyright -->
    <footer class="max-w-lg mx-auto mt-8 pb-8 text-center">
        <p class="text-gray-400 text-xs tracking-widest uppercase">
            &copy; 22026 Caner Cikla | Urlaubsplaner
        </p>
        <div class="mt-2 flex justify-center space-x-4">
            <span class="h-1 w-1 bg-gray-300 rounded-full"></span>
            <span class="h-1 w-1 bg-gray-300 rounded-full"></span>
            <span class="h-1 w-1 bg-gray-300 rounded-full"></span>
        </div>
    </footer>

</body>
</html>
