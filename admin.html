<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Panel | Urlaubsplaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">Admin-Panel</h1>
                <p class="text-gray-400 text-sm mt-1">Verwaltung der Urlaubsanträge</p>
                <div class="flex gap-6 mt-4">
                    <button onclick="setArchivSicht(false)" id="btnAktiv" class="text-sm font-bold text-blue-400 border-b-2 border-blue-400 pb-1 transition-all">Aktuelle Anträge</button>
                    <button onclick="setArchivSicht(true)" id="btnArchiv" class="text-sm font-bold text-gray-500 hover:text-white pb-1 transition-all">Archiv</button>
                </div>
            </div>
            <button onclick="ladeAntraege()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-700 transition shadow-lg flex items-center gap-2">
                <span>🔄</span> <span class="hidden md:inline">Aktualisieren</span>
            </button>
        </div>

        <div id="liste" class="grid gap-6">
            <div class="flex justify-center p-20">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Sicherheit & Login
        const PASSWORT = "Danfoss123"; 
        if (prompt("Bitte Admin-Passwort eingeben:") !== PASSWORT) { 
            window.location.href = "index.html"; 
        }

        // 2. Supabase Konfiguration
        const SUPABASE_URL = 'https://gmwmnnsmanmhblmmvusj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd21ubnNtYW5taGJsbW12dXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjA5ODYsImV4cCI6MjA5Mjg5Njk4Nn0.Y5_SWw_25e0lTDcxU1dqkX7atICOpyk2_jpcWBkrRKM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let zeigeArchiv = false;

        function setArchivSicht(status) {
            zeigeArchiv = status;
            document.getElementById('btnAktiv').className = !status ? "text-sm font-bold text-blue-400 border-b-2 border-blue-400 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            document.getElementById('btnArchiv').className = status ? "text-sm font-bold text-blue-400 border-b-2 border-blue-400 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            ladeAntraege();
        }

        async function ladeAntraege() {
            const container = document.getElementById('liste');
            
            const { data, error } = await _supabase
                .from('Urlaubsplaner')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<div class="bg-red-900/20 border border-red-500 p-4 rounded text-red-400 text-center">Fehler beim Laden: ${error.message}</div>`;
                return;
            }

            container.innerHTML = '';

            // Filterung für das Portfolio: Falls archiviert NULL ist, zeige es bei "Aktuell"
            const gefiltert = data.filter(antrag => {
                return zeigeArchiv ? (antrag.archiviert === true) : (antrag.archiviert !== true);
            });

            if (gefiltert.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-600 font-medium">Keine Einträge in diesem Bereich gefunden.</div>`;
                return;
            }

            gefiltert.forEach(antrag => {
                const card = document.createElement('div');
                const statusColor = antrag.status === 'genehmigt' ? 'border-green-500' : (antrag.status === 'abgelehnt' ? 'border-red-600' : 'border-yellow-500');
                
                // Begründung nur anzeigen wenn vorhanden
                const begründungHtml = antrag.begruendung ? 
                    `<div class="mt-4 p-3 bg-gray-900/60 rounded-lg border border-gray-700/50 text-sm italic text-gray-300">
                        "${antrag.begruendung}"
                     </div>` : '';

                // Sonderurlaub Badge
                const sonderBadge = antrag.sonderurlaub ? 
                    `<span class="bg-indigo-900/60 text-indigo-300 text-[10px] px-2 py-0.5 rounded ml-2 border border-indigo-700 font-bold uppercase tracking-wider">Sonderurlaub</span>` : '';

                card.className = `bg-gray-800 p-6 rounded-2xl border-l-8 ${statusColor} shadow-xl card-hover relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between gap-6">
                        <div class="flex-1">
                            <div class="flex items-center mb-1">
                                <h2 class="text-xl font-extrabold text-white tracking-tight">${antrag.name || 'Unbekannter Mitarbeiter'}</h2>
                                ${sonderBadge}
                            </div>
                            <p class="text-xs text-gray-500 font-mono mb-4">PNR: ${antrag.personalnummer || '---'}</p>
                            
                            <div class="inline-flex items-center gap-3 bg-gray-900/80 px-4 py-2 rounded-xl border border-gray-700 shadow-inner">
                                <span class="text-blue-400 font-bold text-sm">${antrag.start_datum}</span>
                                <span class="text-gray-600 text-xs">bis</span>
                                <span class="text-blue-400 font-bold text-sm">${antrag.end_datum}</span>
                            </div>

                            ${begründungHtml}
                        </div>
                        
                        <div class="flex flex-row md:flex-col gap-2 shrink-0 justify-end md:justify-start">
                            ${!antrag.archiviert ? `
                                <button onclick="updateStatus('${antrag.id}', 'genehmigt')" class="bg-green-600 hover:bg-green-500 text-white text-xs px-5 py-2.5 rounded-xl font-bold transition shadow-lg active:scale-95">Genehmigen</button>
                                <button onclick="updateStatus('${antrag.id}', 'abgelehnt')" class="bg-transparent hover:bg-red-900/30 text-red-400 text-xs px-5 py-2.5 rounded-xl transition border border-red-900 active:scale-95">Ablehnen</button>
                                <button onclick="archivieren('${antrag.id}')" class="bg-gray-700 hover:bg-gray-650 text-gray-300 text-xs px-5 py-2.5 rounded-xl transition mt-2 active:scale-95">Archivieren</button>
                            ` : `
                                <button onclick="archivieren('${antrag.id}', false)" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-5 py-2.5 rounded-xl font-bold transition shadow-lg active:scale-95">Wiederherstellen</button>
                            `}
                        </div>
                    </div>
                    <div class="absolute bottom-2 right-4 opacity-10 text-[10px] font-mono">${antrag.id.substring(0,8)}</div>
                `;
                container.appendChild(card);
            });
        }

        async function updateStatus(id, status) {
            const { error } = await _supabase.from('Urlaubsplaner').update({ status: status }).eq('id', id);
            if(error) alert("Fehler: " + error.message);
            ladeAntraege();
        }

        async function archivieren(id, status = true) {
            const { error } = await _supabase.from('Urlaubsplaner').update({ archiviert: status }).eq('id', id);
            if(error) alert("Fehler: " + error.message);
            ladeAntraege();
        }

        // Initiales Laden
        ladeAntraege();
    </script>
</body>
</html>
