<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Panel | Archiv-System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Admin-Panel</h1>
                <div class="flex gap-4 mt-2">
                    <button onclick="setArchivSicht(false)" id="btnAktiv" class="text-sm font-bold text-blue-500 border-b-2 border-blue-500 pb-1">Aktuell</button>
                    <button onclick="setArchivSicht(true)" id="btnArchiv" class="text-sm font-bold text-gray-500 hover:text-white pb-1">Archiv</button>
                </div>
            </div>
            <button onclick="ladeAntraege()" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-lg transition">🔄</button>
        </div>

        <div id="liste" class="grid gap-6">
            <p class="text-center text-gray-500">Lade Daten...</p>
        </div>
    </div>

    <script>
        const PASSWORT = "Danfoss123"; 
        if (prompt("Passwort:") !== PASSWORT) { window.location.href = "index.html"; }

        const _supabase = supabase.createClient('https://gmwmnnsmanmhblmmvusj.supabase.co', 'DEIN_KEY');
        let zeigeArchiv = false;

        function setArchivSicht(status) {
            zeigeArchiv = status;
            document.getElementById('btnAktiv').className = !status ? "text-sm font-bold text-blue-500 border-b-2 border-blue-500 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            document.getElementById('btnArchiv').className = status ? "text-sm font-bold text-blue-500 border-b-2 border-blue-500 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            ladeAntraege();
        }

        async function ladeAntraege() {
            const { data, error } = await _supabase
                .from('Urlaubsplaner')
                .select('*')
                .eq('archiviert', zeigeArchiv)
                .order('created_at', { ascending: false });

            const container = document.getElementById('liste');
            container.innerHTML = '';

            data.forEach(antrag => {
                const card = document.createElement('div');
                card.className = "bg-gray-800 p-6 rounded-xl border-l-4 " + (antrag.status === 'genehmigt' ? 'border-green-500' : 'border-yellow-500');
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-xl font-bold">${antrag.name}</h2>
                            <p class="text-blue-300">${antrag.start_datum} bis ${antrag.end_datum}</p>
                            <p class="text-xs text-gray-500 uppercase mt-1">Status: ${antrag.status}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            ${!antrag.archiviert ? 
                                `<button onclick="updateStatus('${antrag.id}', 'genehmigt')" class="bg-green-600 text-xs px-3 py-1 rounded">Genehmigen</button>
                                 <button onclick="archivieren('${antrag.id}')" class="bg-gray-600 text-xs px-3 py-1 rounded">Ins Archiv</button>` :
                                `<button onclick="archivieren('${antrag.id}', false)" class="bg-blue-600 text-xs px-3 py-1 rounded">Wiederherstellen</button>`
                            }
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateStatus(id, status) {
            await _supabase.from('Urlaubsplaner').update({ status: status }).eq('id', id);
            ladeAntraege();
        }

        async function archivieren(id, status = true) {
            await _supabase.from('Urlaubsplaner').update({ archiviert: status }).eq('id', id);
            ladeAntraege();
        }

        ladeAntraege();
    </script>
</body>
</html>
