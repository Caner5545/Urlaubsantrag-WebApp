<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Panel | Urlaubsplaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6 border-b border-gray-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">Admin-Panel</h1>
                <div class="flex gap-4 mt-2">
                    <button onclick="setArchivSicht(false)" id="btnAktiv" class="text-sm font-bold text-blue-500 border-b-2 border-blue-500 pb-1">Aktuell</button>
                    <button onclick="setArchivSicht(true)" id="btnArchiv" class="text-sm font-bold text-gray-500 hover:text-white pb-1">Archiv</button>
                </div>
            </div>
            <button onclick="ladeAntraege()" class="bg-gray-800 hover:bg-gray-700 p-2 rounded-lg transition">🔄 Aktualisieren</button>
        </div>

        <div id="liste" class="grid gap-6">
            <p class="text-center text-gray-500">Lade Daten...</p>
        </div>
    </div>

    <script>
        // 1. Passwortschutz
        const PASSWORT = "Danfoss123"; 
        if (prompt("Passwort:") !== PASSWORT) { 
            window.location.href = "index.html"; 
        }

        // 2. Supabase Verbindung (Key wurde hier eingefügt)
        const SUPABASE_URL = 'https://gmwmnnsmanmhblmmvusj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd21ubnNtYW5taGJsbW12dXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjA5ODYsImV4cCI6MjA5Mjg5Njk4Nn0.Y5_SWw_25e0lTDcxU1dqkX7atICOpyk2_jpcWBkrRKM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let zeigeArchiv = false;

        function setArchivSicht(status) {
            zeigeArchiv = status;
            document.getElementById('btnAktiv').className = !status ? "text-sm font-bold text-blue-500 border-b-2 border-blue-500 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            document.getElementById('btnArchiv').className = status ? "text-sm font-bold text-blue-500 border-b-2 border-blue-500 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            ladeAntraege();
        }

        async function ladeAntraege() {
            const container = document.getElementById('liste');
            
            // Wir holen alle Daten und filtern im Code, das ist sicherer gegen NULL-Werte
            const { data, error } = await _supabase
                .from('Urlaubsplaner')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500">Fehler: ${error.message}</p>`;
                return;
            }

            container.innerHTML = '';

            // Filterung: Im Archiv nur 'true', sonst alles was NICHT 'true' ist
            const gefiltert = data.filter(antrag => {
                return zeigeArchiv ? (antrag.archiviert === true) : (antrag.archiviert !== true);
            });

            if (gefiltert.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 mt-10">Keine Anträge gefunden.</p>`;
                return;
            }

            gefiltert.forEach(antrag => {
                const card = document.createElement('div');
                const statusColor = antrag.status === 'genehmigt' ? 'border-green-500' : (antrag.status === 'abgelehnt' ? 'border-red-500' : 'border-yellow-500');
                
                card.className = `bg-gray-800 p-6 rounded-xl border-l-4 ${statusColor} shadow-lg`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h2 class="text-xl font-bold">${antrag.name || 'Unbekannt'}</h2>
                            <p class="text-blue-300 font-medium">${antrag.start_datum} bis ${antrag.end_datum}</p>
                            <p class="text-[10px] text-gray-500 uppercase mt-1 tracking-widest">Status: ${antrag.status}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            ${!antrag.archiviert ? `
                                <button onclick="updateStatus('${antrag.id}', 'genehmigt')" class="bg-green-600 hover:bg-green-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition">Genehmigen</button>
                                <button onclick="updateStatus('${antrag.id}', 'abgelehnt')" class="bg-red-600 hover:bg-red-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition">Ablehnen</button>
                                <button onclick="archivieren('${antrag.id}')" class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-4 py-2 rounded-lg transition">Archivieren</button>
                            ` : `
                                <button onclick="archivieren('${antrag.id}', false)" class="bg-blue-600 hover:bg-blue-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition">Wiederherstellen</button>
                            `}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateStatus(id, status) {
            await _supabase.from('Urlaubsplaner').update({ status: status }).eq('id', id);
            ladeAntraege();
        }

        async function archivieren(id, status = true) {
            await _supabase.from('Urlaubsplaner').update({ archiviert: status }).eq('id', id);
            ladeAntraege();
        }

        ladeAntraege();
    </script>
</body>
</html>
