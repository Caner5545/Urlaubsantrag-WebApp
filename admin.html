<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Panel | Urlaubsplaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">Admin-Panel</h1>
                <div class="flex gap-6 mt-4">
                    <button onclick="setArchivSicht(false)" id="btnAktiv" class="text-sm font-bold text-blue-400 border-b-2 border-blue-400 pb-1">Aktuelle Anträge</button>
                    <button onclick="setArchivSicht(true)" id="btnArchiv" class="text-sm font-bold text-gray-500 hover:text-white pb-1">Archiv</button>
                </div>
            </div>
            <button onclick="ladeAntraege()" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg border border-gray-700 transition flex items-center gap-2">
                <span>🔄</span> <span>Refresh</span>
            </button>
        </div>

        <div id="liste" class="grid gap-6">
            </div>
    </div>

    <script>
        // Passwortschutz
        const PASSWORT = "Danfoss123"; 
        if (prompt("Bitte Admin-Passwort eingeben:") !== PASSWORT) { 
            window.location.href = "index.html"; 
        }

        const SUPABASE_URL = 'https://gmwmnnsmanmhblmmvusj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdtd21ubnNtYW5taGJsbW12dXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjA5ODYsImV4cCI6MjA5Mjg5Njk4Nn0.Y5_SWw_25e0lTDcxU1dqkX7atICOpyk2_jpcWBkrRKM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let zeigeArchiv = false;

        function setArchivSicht(status) {
            zeigeArchiv = status;
            document.getElementById('btnAktiv').className = !status ? "text-sm font-bold text-blue-400 border-b-2 border-blue-400 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            document.getElementById('btnArchiv').className = status ? "text-sm font-bold text-blue-400 border-b-2 border-blue-400 pb-1" : "text-sm font-bold text-gray-500 hover:text-white pb-1";
            ladeAntraege();
        }

        async function ladeAntraege() {
            const container = document.getElementById('liste');
            container.innerHTML = '<p class="text-center">Lade Daten...</p>';
            
            const { data, error } = await _supabase
                .from('Urlaubsplaner')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = `<p class="text-red-500">Fehler: ${error.message}</p>`;
                return;
            }

            // DER FIX: Wir prüfen robuster auf den Archiv-Status
            const gefiltert = data.filter(antrag => {
                const isArchiviert = antrag.archiviert === true;
                return zeigeArchiv ? isArchiviert : !isArchiviert;
            });

            if (gefiltert.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 mt-10">Keine Einträge vorhanden.</p>`;
                return;
            }

            container.innerHTML = '';
            gefiltert.forEach(antrag => {
                const card = document.createElement('div');
                const statusColor = antrag.status === 'genehmigt' ? 'border-green-500' : (antrag.status === 'abgelehnt' ? 'border-red-600' : 'border-yellow-500');
                
                const sonderBadge = antrag.sonderurlaub ? `<span class="bg-indigo-900 text-indigo-200 text-[10px] px-2 py-0.5 rounded ml-2 border border-indigo-700 uppercase font-bold">Sonderurlaub</span>` : '';
                const begründungHtml = antrag.begruendung ? `<div class="mt-3 p-3 bg-gray-900/50 rounded border border-gray-700 text-sm italic text-gray-300">"${antrag.begruendung}"</div>` : '';

                card.className = `bg-gray-800 p-6 rounded-xl border-l-8 ${statusColor} shadow-lg`;
                card.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex items-center">
                                <h2 class="text-xl font-bold">${antrag.name || 'Unbekannt'}</h2>
                                ${sonderBadge}
                            </div>
                            <p class="text-xs text-gray-500 font-mono">PNR: ${antrag.personalnummer || '---'}</p>
                            <p class="text-blue-300 font-bold mt-2">📅 ${antrag.start_datum} bis ${antrag.end_datum}</p>
                            ${begründungHtml}
                        </div>
                        <div class="flex flex-row md:flex-col gap-2">
                            ${!antrag.archiviert ? `
                                <button onclick="updateStatus('${antrag.id}', 'genehmigt')" class="bg-green-600 px-4 py-2 rounded font-bold text-xs">Genehmigen</button>
                                <button onclick="updateStatus('${antrag.id}', 'abgelehnt')" class="border border-red-700 text-red-400 px-4 py-2 rounded text-xs">Ablehnen</button>
                                <button onclick="archivieren('${antrag.id}', true)" class="bg-gray-700 px-4 py-2 rounded text-xs mt-2">Archivieren</button>
                            ` : `
                                <button onclick="archivieren('${antrag.id}', false)" class="bg-blue-600 px-4 py-2 rounded font-bold text-xs">Wiederherstellen</button>
                            `}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateStatus(id, status) {
            await _supabase.from('Urlaubsplaner').update({ status: status }).eq('id', id);
            ladeAntraege();
        }

        async function archivieren(id, status) {
            await _supabase.from('Urlaubsplaner').update({ archiviert: status }).eq('id', id);
            ladeAntraege();
        }

        ladeAntraege();
    </script>
</body>
</html>
